[PHP]

; Decides whether PHP may expose the fact that it is installed on the server
; (e.g. by adding its signature to the Web server header).  It is no security
; threat in any way, but it makes it possible to determine whether you use PHP
; on your server or not.
; https://php.net/expose-php
expose_php = Off

; Never include function arguments in exception stack traces. Credentials can
; appear as arguments (e.g. a database password passed to PDO::__construct),
; so a trace crossing such a frame would embed them in logs and error output.
; php.ini-production already sets both of these; they are made explicit here
; so the hardening does not depend on which template php.ini was installed.
; https://www.php.net/manual/en/ini.core.php#ini.zend.exception-ignore-args
zend.exception_ignore_args = On
zend.exception_string_param_max_len = 0

[Date]

; Defines the default timezone used by the date functions
; https://php.net/date.timezone
date.timezone = "UTC"
